<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHIP IT.</title>
  <style>
    :root {
      --green: #00ff00;
      --green-dim: #00aa00;
      --green-dark: #003300;
      --green-glow: 0 0 6px #00ff00, 0 0 12px #00cc00;
      --bg: #000000;
      --font: 'Courier New', Courier, monospace;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font);
      color: var(--green);
      overflow: hidden;
    }

    /* CRT monitor outer shell */
    .monitor {
      position: relative;
      width: min(720px, 98vw);
      background: var(--bg);
      border: 2px solid var(--green-dim);
      box-shadow:
        0 0 0 6px #0d0d0d,
        0 0 0 8px #1a1a1a,
        0 0 40px rgba(0, 255, 0, 0.15),
        inset 0 0 60px rgba(0, 0, 0, 0.8);
      border-radius: 4px;
      overflow: hidden;
      animation: flicker 8s infinite;
    }

    /* Scanlines overlay */
    .monitor::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0, 0, 0, 0.25) 3px,
        rgba(0, 0, 0, 0.25) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* Vignette */
    .monitor::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center,
        transparent 55%,
        rgba(0, 0, 0, 0.65) 100%
      );
      pointer-events: none;
      z-index: 101;
    }

    @keyframes flicker {
      0%, 94%, 96%, 98%, 100% { opacity: 1; }
      95%                      { opacity: 0.92; }
      97%                      { opacity: 0.96; }
      99%                      { opacity: 0.93; }
    }

    .screen {
      padding: 24px 28px 20px;
      display: flex;
      flex-direction: column;
      gap: 0;
      min-height: 580px;
    }

    /* ── TITLE ─────────────────────────────────── */
    .title-area {
      border-bottom: 1px solid var(--green-dim);
      padding-bottom: 12px;
      margin-bottom: 18px;
    }

    .title-main {
      font-size: clamp(26px, 5vw, 38px);
      font-weight: bold;
      letter-spacing: 0.15em;
      text-shadow: var(--green-glow);
      line-height: 1;
    }

    .title-main span {
      color: #ffffff;
      text-shadow: 0 0 8px #ffffff, 0 0 16px #aaffaa;
    }

    .title-sub {
      margin-top: 4px;
      font-size: 11px;
      color: var(--green-dim);
      letter-spacing: 0.2em;
    }

    .title-sub .sep { margin: 0 6px; }

    /* ── CURRENT TASK PANEL ────────────────────── */
    .task-panel {
      border: 1px solid var(--green-dim);
      padding: 14px 16px;
      margin-bottom: 18px;
      position: relative;
      background: rgba(0, 40, 0, 0.18);
    }

    .panel-label {
      position: absolute;
      top: -9px;
      left: 12px;
      background: var(--bg);
      padding: 0 6px;
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--green-dim);
    }

    .task-id {
      font-size: 10px;
      color: var(--green-dim);
      letter-spacing: 0.15em;
      margin-bottom: 6px;
    }

    .task-title {
      font-size: clamp(13px, 2.4vw, 16px);
      font-weight: bold;
      text-shadow: 0 0 4px var(--green);
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .task-desc {
      font-size: 12px;
      color: var(--green-dim);
      line-height: 1.7;
    }

    .task-tags {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 10px;
      letter-spacing: 0.15em;
      padding: 2px 7px;
      border: 1px solid var(--green-dim);
      color: var(--green-dim);
    }

    /* ── BUTTONS ───────────────────────────────── */
    .actions {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
    }

    .btn {
      flex: 1;
      font-family: var(--font);
      font-size: clamp(12px, 2vw, 15px);
      font-weight: bold;
      letter-spacing: 0.2em;
      padding: 12px 10px;
      background: transparent;
      border: 2px solid var(--green);
      color: var(--green);
      cursor: pointer;
      text-shadow: var(--green-glow);
      box-shadow: 0 0 8px rgba(0,255,0,0.2), inset 0 0 8px rgba(0,255,0,0.05);
      transition: background 0.08s, box-shadow 0.08s, color 0.08s;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--green);
      opacity: 0;
      transition: opacity 0.08s;
    }

    .btn:hover::before  { opacity: 0.12; }
    .btn:active::before { opacity: 0.28; }

    .btn:hover {
      box-shadow: 0 0 16px rgba(0,255,0,0.45), inset 0 0 12px rgba(0,255,0,0.1);
    }

    .btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      pointer-events: none;
    }

    .btn-label {
      position: relative;
      z-index: 1;
    }

    .btn-sub {
      display: block;
      font-size: 9px;
      font-weight: normal;
      color: var(--green-dim);
      letter-spacing: 0.15em;
      margin-top: 2px;
      position: relative;
      z-index: 1;
    }

    .btn.quick {
      border-color: #aaff00;
      color: #aaff00;
      text-shadow: 0 0 6px #aaff00, 0 0 12px #88cc00;
      box-shadow: 0 0 8px rgba(170,255,0,0.2), inset 0 0 8px rgba(170,255,0,0.05);
    }

    .btn.quick::before { background: #aaff00; }
    .btn.quick:hover {
      box-shadow: 0 0 18px rgba(170,255,0,0.5), inset 0 0 12px rgba(170,255,0,0.12);
    }

    .btn.quick .btn-sub { color: #88aa00; }

    /* ── METERS ────────────────────────────────── */
    .meters {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }

    .meter-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .meter-label {
      font-size: 10px;
      letter-spacing: 0.18em;
      color: var(--green-dim);
      white-space: nowrap;
      width: 150px;
      flex-shrink: 0;
    }

    .meter-track {
      flex: 1;
      height: 14px;
      border: 1px solid var(--green-dim);
      background: var(--green-dark);
      position: relative;
      overflow: hidden;
    }

    .meter-fill {
      height: 100%;
      position: relative;
      transition: width 0.4s ease;
    }

    .meter-fill::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to right,
        transparent 0px,
        transparent 5px,
        rgba(0,0,0,0.3) 5px,
        rgba(0,0,0,0.3) 6px
      );
    }

    .meter-fill.debt {
      width: 0%;
      background: linear-gradient(to right, #00ff00 0%, #ffaa00 60%, #ff4400 100%);
      box-shadow: 0 0 6px #ff6600;
    }

    .meter-fill.time {
      width: 100%;
      background: linear-gradient(to right, #ff2200 0%, #ffaa00 50%, #00ff00 100%);
      box-shadow: 0 0 6px rgba(0,255,0,0.4);
      background-size: 200% 100%;
      background-position: right center;
    }

    .meter-value {
      font-size: 11px;
      color: var(--green-dim);
      width: 36px;
      text-align: right;
      flex-shrink: 0;
    }

    /* ── LOG ───────────────────────────────────── */
    .log-area {
      border: 1px solid var(--green-dim);
      flex: 1;
      min-height: 130px;
      background: rgba(0, 15, 0, 0.4);
      position: relative;
      overflow: hidden;
    }

    .log-header {
      padding: 5px 12px;
      font-size: 9px;
      letter-spacing: 0.25em;
      color: var(--green-dim);
      border-bottom: 1px solid var(--green-dark);
      background: rgba(0, 30, 0, 0.3);
    }

    .log-entries {
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 120px;
      overflow-y: auto;
      scrollbar-width: none;
    }

    .log-entries::-webkit-scrollbar { display: none; }

    .log-line {
      font-size: 11px;
      line-height: 1.5;
      color: var(--green-dim);
    }

    .log-line .prompt { color: var(--green); margin-right: 4px; }

    .log-line.warn .prompt { color: #ffaa00; }
    .log-line.warn        { color: #cc8800; }

    .log-line.info .prompt { color: #00aaff; }
    .log-line.info        { color: #0088cc; }

    .log-line.good .prompt { color: #00ff88; }
    .log-line.good        { color: var(--green-dim); }

    .cursor {
      display: inline-block;
      width: 8px;
      height: 12px;
      background: var(--green);
      vertical-align: text-bottom;
      animation: blink 1.1s step-end infinite;
      box-shadow: 0 0 4px var(--green);
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── STATUS BAR ────────────────────────────── */
    .status-bar {
      margin-top: 14px;
      padding-top: 10px;
      border-top: 1px solid var(--green-dark);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 9px;
      color: var(--green-dark);
      letter-spacing: 0.15em;
    }

    .status-bar .pulse {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 4px var(--green);
      margin-right: 5px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 4px var(--green); }
      50%       { opacity: 0.5; box-shadow: 0 0 2px var(--green); }
    }

    /* ── GAME OVER OVERLAY ─────────────────────── */
    .overlay {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 50;
      background: rgba(0, 0, 0, 0.93);
      align-items: center;
      justify-content: center;
    }

    .overlay.active { display: flex; }

    .overlay-box {
      border: 2px solid var(--green);
      padding: 28px 32px;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 0 30px rgba(0,255,0,0.3), 0 0 60px rgba(0,255,0,0.08);
    }

    .overlay-box.collapse {
      border-color: #ff4400;
      box-shadow: 0 0 30px rgba(255,68,0,0.45), 0 0 60px rgba(255,68,0,0.1);
    }

    .overlay-box.deadline {
      border-color: #ffaa00;
      box-shadow: 0 0 30px rgba(255,170,0,0.4), 0 0 60px rgba(255,170,0,0.08);
    }

    .overlay-box.success-clean {
      border-color: var(--green);
      box-shadow: 0 0 40px rgba(0,255,0,0.55), 0 0 80px rgba(0,255,0,0.15);
    }

    .overlay-box.success-dirty {
      border-color: #aaff00;
      box-shadow: 0 0 30px rgba(170,255,0,0.35), 0 0 60px rgba(170,255,0,0.08);
    }

    .overlay-title {
      font-size: clamp(14px, 3.2vw, 22px);
      font-weight: bold;
      letter-spacing: 0.15em;
      line-height: 1.35;
      margin-bottom: 14px;
      text-shadow: var(--green-glow);
    }

    .overlay-box.collapse .overlay-title {
      color: #ff4400;
      text-shadow: 0 0 6px #ff4400, 0 0 14px #cc2200;
    }

    .overlay-box.deadline .overlay-title {
      color: #ffaa00;
      text-shadow: 0 0 6px #ffaa00, 0 0 14px #cc8800;
    }

    .overlay-box.success-dirty .overlay-title {
      color: #aaff00;
      text-shadow: 0 0 6px #aaff00, 0 0 14px #88cc00;
    }

    .overlay-body {
      font-size: 12px;
      color: var(--green-dim);
      line-height: 1.8;
      margin-bottom: 18px;
    }

    .overlay-stats {
      font-size: 11px;
      color: var(--green-dim);
      margin-bottom: 22px;
      border-left: 2px solid var(--green-dark);
      padding-left: 12px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .overlay-stats span { color: var(--green); }

    .btn-restart {
      font-family: var(--font);
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 0.2em;
      padding: 10px 24px;
      background: transparent;
      border: 2px solid var(--green);
      color: var(--green);
      cursor: pointer;
      text-shadow: var(--green-glow);
      box-shadow: 0 0 8px rgba(0,255,0,0.2);
      transition: box-shadow 0.1s, background 0.1s;
    }

    .btn-restart:hover {
      box-shadow: 0 0 18px rgba(0,255,0,0.5);
      background: rgba(0,255,0,0.05);
    }
  </style>
</head>
<body>
  <div class="monitor">

    <!-- GAME OVER OVERLAY -->
    <div class="overlay" id="overlay">
      <div class="overlay-box" id="overlay-box">
        <div class="overlay-title" id="overlay-title"></div>
        <div class="overlay-body" id="overlay-body"></div>
        <div class="overlay-stats" id="overlay-stats"></div>
        <button class="btn-restart" onclick="initGame()">[ NEW SPRINT ]</button>
      </div>
    </div>

    <div class="screen">

      <!-- TITLE -->
      <div class="title-area">
        <div class="title-main">&gt; SHIP <span>IT.</span></div>
        <div class="title-sub">
          v0.1.0
          <span class="sep">//</span>
          DEPLOY OR DIE
          <span class="sep">//</span>
          <span id="sprint-counter">SPRINT 1/5</span>
        </div>
      </div>

      <!-- CURRENT TASK -->
      <div class="task-panel">
        <div class="panel-label">// CURRENT TASK</div>
        <div class="task-id" id="task-id"></div>
        <div class="task-title" id="task-title"></div>
        <div class="task-desc" id="task-desc"></div>
        <div class="task-tags" id="task-tags"></div>
      </div>

      <!-- BUTTONS -->
      <div class="actions">
        <button class="btn clean" id="btn-clean" onclick="applyAction('clean')">
          <span class="btn-label">[ CLEAN ]</span>
          <span class="btn-sub" id="clean-sub"></span>
        </button>
        <button class="btn quick" id="btn-quick" onclick="applyAction('quick')">
          <span class="btn-label">[ QUICK SHIP ]</span>
          <span class="btn-sub" id="quick-sub"></span>
        </button>
      </div>

      <!-- METERS -->
      <div class="meters">
        <div class="meter-row">
          <span class="meter-label">TECHNICAL DEBT</span>
          <div class="meter-track">
            <div class="meter-fill debt" id="debt-fill"></div>
          </div>
          <span class="meter-value" id="debt-value">0</span>
        </div>
        <div class="meter-row">
          <span class="meter-label">TIME REMAINING</span>
          <div class="meter-track">
            <div class="meter-fill time" id="time-fill"></div>
          </div>
          <span class="meter-value" id="time-value">12</span>
        </div>
      </div>

      <!-- LOG -->
      <div class="log-area">
        <div class="log-header">// SYSTEM LOG</div>
        <div class="log-entries" id="log-entries"></div>
      </div>

      <!-- STATUS BAR -->
      <div class="status-bar">
        <span><span class="pulse"></span>SYSTEM ONLINE</span>
        <span>DEADLINE: FRIDAY 5PM</span>
        <span id="status-debt">DEBT: 0/100</span>
      </div>

    </div>
  </div>

  <script>
    // ─── DATA ──────────────────────────────────────────────────────────────

    const TASK_POOL = [
      "Implement search",
      "Migrate the database",
      "Add two-factor authentication",
      "Fix the bug that only happens on Tuesdays",
      "Patch a security vulnerability",
      "Add analytics tracking",
      "Rebuild UI for mobile",
      "Integrate payment API"
    ];

    const TASK_FLAVOR = {
      "Implement search":
        "Product wants fuzzy search, filters, and 'AI-powered' results. No spec doc exists. By Friday.",
      "Migrate the database":
        "Schema unchanged since 2016. Nobody knows what half these columns do. No rollback plan.",
      "Add two-factor authentication":
        "Security flagged this 6 months ago. Compliance is watching. The original auth code is a mystery.",
      "Fix the bug that only happens on Tuesdays":
        "Reproducible only in prod. On Tuesdays. Between 2–4pm. No one knows why.",
      "Patch a security vulnerability":
        "CVE score: 9.8. Discovered at 4:47pm Friday. No tests cover the affected auth layer.",
      "Add analytics tracking":
        "Marketing wants 47 custom events. Legal hasn't signed off on the privacy policy update.",
      "Rebuild UI for mobile":
        "Figma has 12 conflicting versions. The designer is on vacation. Users are very loud about this.",
      "Integrate payment API":
        "Third-party docs are outdated. Sandbox is down 'temporarily.' Getting payments wrong is... bad."
    };

    const TASK_TAGS = {
      "Implement search":                          ["BACKEND", "PRODUCT", "INDEXING"],
      "Migrate the database":                      ["DATABASE", "BREAKING", "RISKY"],
      "Add two-factor authentication":             ["SECURITY", "AUTH", "COMPLIANCE"],
      "Fix the bug that only happens on Tuesdays": ["BUG", "MYSTERIOUS", "PROD-ONLY"],
      "Patch a security vulnerability":            ["SECURITY", "CVE", "P0"],
      "Add analytics tracking":                    ["FRONTEND", "TRACKING", "GDPR?"],
      "Rebuild UI for mobile":                     ["FRONTEND", "DESIGN", "RESPONSIVE"],
      "Integrate payment API":                     ["BACKEND", "PAYMENTS", "CRITICAL"]
    };

    const OUTCOME_FLAVOR = {
      "Implement search": {
        clean: "Tests written. Edge cases handled. The PM now wants autocomplete. Autocomplete was not scoped.",
        quick: "Ctrl+F wrapped in an API endpoint. It returns results. Whether they are relevant is 'a v2 concern.'"
      },
      "Migrate the database": {
        clean: "Migration ran clean. Rollback script committed. You documented every column. You're one of the good ones.",
        quick: "You ran it directly in prod at 2am. It worked. You will never tell anyone you did this."
      },
      "Add two-factor authentication": {
        clean: "Tested, documented, edge cases covered. Users now complain about the extra step. That's correct behavior.",
        quick: "It sends a code. Whether the code validates correctly under all conditions is a question for another sprint."
      },
      "Fix the bug that only happens on Tuesdays": {
        clean: "It was a timezone issue. Of course it was a timezone issue. The fix took four days.",
        quick: "You added an if-statement checking the day of the week. It works. You tell no one."
      },
      "Patch a security vulnerability": {
        clean: "Patched, tested, PR reviewed. You feel genuinely good about this one. Write it down.",
        quick: "You changed the error message so it reveals less information. Security through reduced verbosity. Shipped."
      },
      "Add analytics tracking": {
        clean: "47 events, properly typed, with a documented schema. Marketing will ignore all of it within a week.",
        quick: "Events fire on everything. Several are duplicates. Most have the wrong user ID. Analytics is now a liability."
      },
      "Rebuild UI for mobile": {
        clean: "Responsive, tested on six devices, pixel-perfect. The designer returns from vacation and has thoughts.",
        quick: "You added `max-width: 100%`. It technically works on mobile. Portrait mode only. Do not rotate the phone."
      },
      "Integrate payment API": {
        clean: "Idempotent requests, retry logic, error handling. The bank's sandbox still returns 500s randomly. Not your fault.",
        quick: "It charges cards. Refund behavior is untested. This will become someone's problem. Possibly yours."
      }
    };

    // ─── GLITCH ────────────────────────────────────────────────────────────

    const GLITCH_CHARS = '!@#$%^&*<>|~/?░▓';
    const glitchState  = new Map(); // id → original text

    function tickGlitch() {
      if (!state || state.debt <= 60 || state.over) return;
      const intensity = Math.min(1, (state.debt - 60) / 40);
      if (Math.random() > intensity * 0.75) return;

      const targets = ['task-title', 'task-desc', 'task-id', 'sprint-counter', 'status-debt'];
      glitchElement(targets[Math.floor(Math.random() * targets.length)]);

      // second simultaneous glitch at high debt
      if (intensity > 0.6 && Math.random() < 0.45) {
        glitchElement(targets[Math.floor(Math.random() * targets.length)]);
      }
    }

    function glitchElement(id) {
      const el = document.getElementById(id);
      if (!el || glitchState.has(id)) return;

      const original = el.textContent;
      if (original.length < 4) return;

      const pos = Math.floor(Math.random() * original.length);
      if (original[pos] === ' ' || original[pos] === '.') return;

      const gc      = GLITCH_CHARS[Math.floor(Math.random() * GLITCH_CHARS.length)];
      const glitched = original.slice(0, pos) + gc + original.slice(pos + 1);

      glitchState.set(id, original);
      el.textContent = glitched;

      setTimeout(() => {
        if (el.textContent === glitched) el.textContent = original;
        glitchState.delete(id);
      }, 50 + Math.random() * 110);
    }

    setInterval(tickGlitch, 110);

    // ─── STATE ─────────────────────────────────────────────────────────────

    let state = {};

    function initGame() {
      glitchState.clear();
      const shuffled = [...TASK_POOL].sort(() => Math.random() - 0.5);
      state = {
        tasks:      shuffled.slice(0, 5),
        current:    0,
        time:       10,
        debt:       0,
        cleanCount: 0,
        quickCount: 0,
        over:       false
      };

      document.getElementById('overlay').classList.remove('active');
      document.getElementById('btn-clean').disabled = false;
      document.getElementById('btn-quick').disabled = false;

      updateMeters();
      renderTask();
      clearLog();
      log('info', '[SYS]', 'Sprint initialized. 5 tasks queued. 10 time units allocated.');
      log('info', '[SYS]', 'Every 20 debt adds +1 time cost to all future actions.');
      log('',     '[>>>]', 'Awaiting your decision on task 1/5.');
    }

    // ─── RENDERING ─────────────────────────────────────────────────────────

    function debtTax() {
      return Math.floor(state.debt / 20);
    }

    function renderTask() {
      const name = state.tasks[state.current];
      const n    = state.current + 1;
      const tax  = debtTax();
      const cc   = 3 + tax;
      const qc   = 1 + tax;

      document.getElementById('sprint-counter').textContent = `SPRINT ${n}/5`;
      document.getElementById('task-id').textContent =
        `TASK-${n} OF 5  ·  ASSIGNED: YOU  ·  PRIORITY: P0`;
      document.getElementById('task-title').textContent = name;
      document.getElementById('task-desc').textContent  = TASK_FLAVOR[name];

      const tagsEl = document.getElementById('task-tags');
      tagsEl.innerHTML = '';
      TASK_TAGS[name].forEach(t => {
        const s = document.createElement('span');
        s.className = 'tag';
        s.textContent = t;
        tagsEl.appendChild(s);
      });
      if (tax > 0) {
        const s = document.createElement('span');
        s.className = 'tag';
        s.style.cssText = 'border-color:#ffaa00;color:#ffaa00;';
        s.textContent = `DEBT TAX: +${tax}TU`;
        tagsEl.appendChild(s);
      }

      document.getElementById('clean-sub').textContent =
        `refactor & test properly · costs ${cc} time unit${cc !== 1 ? 's' : ''}`;
      document.getElementById('quick-sub').textContent =
        `yolo deploy, fix later · costs ${qc} time unit${qc !== 1 ? 's' : ''} · +20 debt`;
    }

    function updateMeters() {
      const dp = Math.min(100, (state.debt / 100) * 100);
      const tp = Math.max(0,   (state.time / 10)  * 100);

      document.getElementById('debt-fill').style.width = dp + '%';
      document.getElementById('debt-value').textContent = state.debt;
      document.getElementById('time-fill').style.width = tp + '%';
      document.getElementById('time-value').textContent = Math.max(0, state.time);
      document.getElementById('status-debt').textContent = `DEBT: ${state.debt}/100`;
    }

    function clearLog() {
      document.getElementById('log-entries').innerHTML = '';
    }

    function log(type, prompt, msg) {
      const el   = document.getElementById('log-entries');
      const prev = el.querySelector('.cursor');
      if (prev) prev.remove();

      const div = document.createElement('div');
      div.className = 'log-line' + (type ? ' ' + type : '');
      div.innerHTML = `<span class="prompt">${prompt}</span>${msg}<span class="cursor"></span>`;
      el.appendChild(div);
      el.scrollTop = el.scrollHeight;
    }

    // ─── ACTIONS ───────────────────────────────────────────────────────────

    function applyAction(type) {
      if (state.over) return;

      const tax  = debtTax();
      const name = state.tasks[state.current];

      if (type === 'clean') {
        const cost = 3 + tax;
        state.time -= cost;
        state.cleanCount++;
        log('good', '[OK ]', `CLEAN: "${name}" · -${cost}tu · debt: ${state.debt}`);
        log('good', '[   ]', OUTCOME_FLAVOR[name].clean);
      } else {
        const cost = 1 + tax;
        state.time -= cost;
        state.debt += 20;
        state.quickCount++;
        log('warn', '[!!!]', `QUICK SHIP: "${name}" · -${cost}tu · debt: ${state.debt}`);
        log('warn', '[   ]', OUTCOME_FLAVOR[name].quick);
      }

      state.current++;
      updateMeters();

      if (state.debt >= 100)   return triggerEnding('collapse');
      if (state.current >= 5)  return triggerEnding('success');
      if (state.time <= 0)     return triggerEnding('deadline');

      renderTask();
      log('info', '[SYS]',
        `Task ${state.current + 1}/5 loaded. Time: ${state.time}u. Debt: ${state.debt}.`);
    }

    // ─── ENDINGS ───────────────────────────────────────────────────────────

    function triggerEnding(type) {
      state.over = true;
      document.getElementById('btn-clean').disabled = true;
      document.getElementById('btn-quick').disabled = true;

      const box     = document.getElementById('overlay-box');
      const titleEl = document.getElementById('overlay-title');
      const bodyEl  = document.getElementById('overlay-body');
      const statsEl = document.getElementById('overlay-stats');

      const done     = Math.min(state.current, 5);
      const timeLeft = Math.max(0, state.time);
      const spent    = Math.min(10, 10 - state.time);

      // Resolve which success variant
      let endType = type;
      if (type === 'success') {
        endType = state.debt <= 40 ? 'success-clean' : 'success-dirty';
      }

      box.className = 'overlay-box ' + endType;

      if (endType === 'success-clean') {
        titleEl.textContent = '> YOU SHIPPED. FOR NOW, THE MACHINE OBEYS.';
        bodyEl.textContent  =
          'Sprint complete. Low debt. Clean history. ' +
          'You resisted every shortcut. The codebase is, briefly, in a good place. ' +
          'Enjoy it. This only happens once.';
        log('good', '[OK ]', 'SUCCESS: all tasks shipped. Debt within bounds. Rare outcome.');
      } else if (endType === 'success-dirty') {
        titleEl.textContent = '> YOU SHIPPED. BUT THE DEBT REMAINS. IT ALWAYS REMAINS.';
        bodyEl.textContent  =
          'Sprint complete. The features work. The codebase did not. ' +
          'You shipped it anyway. Next sprint, the debt will be waiting. ' +
          'It has nowhere else to be.';
        log('good', '[>>>]', 'SUCCESS: shipped. Debt unresolved. It carries forward.');
      } else if (endType === 'collapse') {
        titleEl.textContent = '> THE SYSTEM HAS EXCEEDED HUMAN UNDERSTANDING.';
        bodyEl.textContent  =
          'No one can modify the codebase without breaking three other things. ' +
          'Deployments are a form of prayer. Two engineers have submitted their notice. ' +
          'You did this.';
        log('warn', '[!!!]', 'COLLAPSE: debt critical. Codebase integrity: undefined.');
      } else {
        titleEl.textContent = '> DEADLINE MISSED';
        bodyEl.textContent  =
          'You ran out of time. The sprint ended. ' +
          `${5 - done} task${5 - done !== 1 ? 's' : ''} left unshipped. ` +
          'The stakeholders are in the lobby. The demo starts in ten minutes.';
        log('warn', '[!!!]', `DEADLINE: time exhausted. ${done}/5 tasks shipped.`);
      }

      statsEl.innerHTML =
        `<div>TASKS SHIPPED:    <span>${done} / 5</span></div>` +
        `<div>TIME SPENT:       <span>${spent} / 10 units</span></div>` +
        `<div>DEBT ACCUMULATED: <span>${state.debt} / 100</span></div>` +
        `<div>CLEAN / QUICK:    <span>${state.cleanCount} clean, ${state.quickCount} quick</span></div>`;

      document.getElementById('overlay').classList.add('active');
    }

    initGame();
  </script>
</body>
</html>
